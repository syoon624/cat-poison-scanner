# ============================================
# Render.com 배포 설정 파일
# ============================================
# GitHub 저장소 연결 시 이 파일을 자동으로 인식합니다.
# backend/ 디렉토리를 Web Service로 배포합니다.

services:
  - type: web
    name: purrfectscan-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # 아래 값들은 Render 대시보드에서 직접 설정
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
