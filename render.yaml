# ============================================
# Render.com 배포 설정 파일
# ============================================
# 프론트엔드(PWA)를 빌드하여 백엔드에서 함께 서빙합니다.
# 하나의 URL로 API + 웹앱 모두 접근 가능.

services:
  - type: web
    name: purrfectscan-api
    runtime: node
    region: singapore
    plan: free
    # rootDir 없음 → 저장소 루트에서 빌드
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install && cp -r ../frontend/dist ./public
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # 아래 값들은 Render 대시보드에서 직접 설정
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
